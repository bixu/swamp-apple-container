manifestVersion: 1
name: "@bixu/container"
version: 0.0.0
# CI overwrites `version:` at publish time via `sed` in .github/workflows/publish.yaml.
# `0.0.0` is a well-known sentinel that makes bad `swamp extension push` calls
# from a working copy immediately visible instead of clobbering a real bundle.

# Apple's `container` CLI runs only on macOS with Virtualization framework
# support (Apple Silicon). Declaring the single real platform is honest — an
# empty list would claim universal support and a Linux user would hit a
# runtime error after pulling. Intentionally forgoes the `platforms-two`
# quality factor.
platforms:
  - darwin-aarch64

description: >
  Swamp execution driver that routes every model method through Apple's
  `container` CLI (macOS 15+). Each execution runs in its own
  Virtualization-framework microVM — a stronger isolation boundary than
  Docker's shared-kernel containers, and the right default for agentic
  or LLM-driven workloads. Two modes, matching swamp's built-in `docker`
  driver: bundle mode (self-contained JS bundle in a Deno-capable image)
  and command mode (`sh -c "<run>"` inside the image). Opt in via
  `defaultDriver: "@bixu/container"` in `.swamp.yaml`, or per
  workflow/job/step/model. Requires `/usr/local/bin/container` (Apple's
  container CLI 1.0+).

repository: "https://github.com/bixu/swamp-apple-container"
contentTypes:
  - drivers
labels:
  - execution-driver
  - macos
  - container
  - apple
  - microvm
  - virtualization-framework
  - security
  - isolation

drivers:
  - container.ts

additionalFiles:
  - container.README.md
